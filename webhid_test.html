<!DOCTYPE html>
<html>
<head><title>Corsair Vanguard 96 WebHID Test</title></head>
<body>
<h1>Corsair Vanguard 96 WebHID Test</h1>
<button id="connect" style="font-size:24px;padding:20px;">Connect Device</button>
<pre id="log" style="font-size:14px;background:#111;color:#0f0;padding:20px;min-height:400px;overflow:auto;"></pre>
<script>
const log = document.getElementById('log');
function L(msg) { log.textContent += msg + '\n'; console.log(msg); }

document.getElementById('connect').onclick = async () => {
    try {
        L('Requesting WebHID device (VID=0x1B1C, PID=0x2B0D)...');
        const devices = await navigator.hid.requestDevice({
            filters: [{ vendorId: 0x1B1C, productId: 0x2B0D }]
        });
        L(`Got ${devices.length} devices`);
        for (const d of devices) {
            L(`  Device: ${d.productName} (VID=${d.vendorId}, PID=${d.productId})`);
            L(`  Opened: ${d.opened}`);
            L(`  Collections: ${d.collections.length}`);
            for (const c of d.collections) {
                L(`    Usage: 0x${c.usage.toString(16)}, Page: 0x${c.usagePage.toString(16)}`);
                L(`    Input reports: ${c.inputReports?.length || 0}`);
                L(`    Output reports: ${c.outputReports?.length || 0}`);
            }
            if (!d.opened) {
                L('Opening device...');
                await d.open();
                L('Device opened!');
            }
            // Try sending a GET property command (property 3 = operating mode)
            const pkt = new Uint8Array(1024);
            pkt[0] = 0x08; // BRAGI
            pkt[1] = 0x02; // GET
            pkt[2] = 0x03; // prop low
            pkt[3] = 0x00; // prop high
            L('Sending GET property 3 (mode)...');
            await d.sendReport(0x00, pkt);
            L('Sent! Waiting for response...');
            d.addEventListener('inputreport', (e) => {
                const data = new Uint8Array(e.data.buffer);
                const hex = Array.from(data.slice(0, 16)).map(b => b.toString(16).padStart(2,'0')).join(' ');
                L(`Response (report ${e.reportId}): ${hex}`);
            });
        }
    } catch(e) {
        L(`Error: ${e.message}`);
    }
};

// Check WebHID availability
if (navigator.hid) {
    L('WebHID is available!');
    navigator.hid.getDevices().then(d => L(`Already paired: ${d.length} devices`));
} else {
    L('WebHID NOT available in this browser!');
}
</script>
</body>
</html>
